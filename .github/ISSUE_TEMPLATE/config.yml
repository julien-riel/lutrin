# No blank issues: the two forms cover the legitimate cases, and a security
# vulnerability must above all NOT arrive through this channel.
blank_issues_enabled: false
contact_links:
  - name: Security vulnerability
    url: https://github.com/julien-riel/lutrin/security/advisories/new
    about: >-
      Do not open a public issue — in particular around "kit install", which
      writes bytes that came from outside onto the disk. Go through a private
      security advisory.
  - name: Usage question
    url: https://github.com/julien-riel/lutrin/discussions
    about: How to write a deck, choose a layout, install a kit.
